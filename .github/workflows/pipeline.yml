name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:

# -------------------- LINT --------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python Lint
        run: |
          pip install flake8
          flake8 api worker

      - name: Node Lint
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Hadolint (Docker lint)
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

# -------------------- TEST --------------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml

# -------------------- BUILD (WITH CACHE + REGISTRY PUSH) --------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Login to local registry
        run: echo "Using local registry at $REGISTRY"

      - name: Build & Push API
        run: |
          docker build -t $REGISTRY/api:$IMAGE_TAG api
          docker push $REGISTRY/api:$IMAGE_TAG

      - name: Build & Push Worker
        run: |
          docker build -t $REGISTRY/worker:$IMAGE_TAG worker
          docker push $REGISTRY/worker:$IMAGE_TAG

      - name: Build & Push Frontend
        run: |
          docker build -t $REGISTRY/frontend:$IMAGE_TAG frontend
          docker push $REGISTRY/frontend:$IMAGE_TAG

# -------------------- SECURITY --------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

# -------------------- INTEGRATION --------------------
  integration:
  runs-on: ubuntu-latest
  needs: security

  steps:
    - uses: actions/checkout@v4

    - name: Pull images from registry
      run: |
        docker pull $REGISTRY/api:$IMAGE_TAG
        docker pull $REGISTRY/worker:$IMAGE_TAG
        docker pull $REGISTRY/frontend:$IMAGE_TAG

    - name: Start stack using pulled images
      run: |
        docker run -d --name redis redis:7
        docker run -d --name api -p 8000:8000 --network host $REGISTRY/api:$IMAGE_TAG

    - name: Integration test
      run: |
        JOB=$(curl -s -X POST http://localhost:8000/submit | jq -r .job_id)
        sleep 5
        STATUS=$(curl -s http://localhost:8000/status/$JOB | jq -r .status)
        test "$STATUS" = "queued"

      - name: Always teardown
        if: always()
        run: docker-compose down -v

# -------------------- DEPLOY --------------------
deploy:
  runs-on: ubuntu-latest
  needs: integration
  if: github.ref == 'refs/heads/main'

  steps:
    - name: Rolling deploy
      run: |
        docker pull $REGISTRY/api:$IMAGE_TAG

        docker stop api || true
        docker rm api || true

        docker run -d \
          --name api \
          -p 8000:8000 \
          $REGISTRY/api:$IMAGE_TAG

        sleep 10

        curl --fail http://localhost:8000/health
