on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

# -------------------- LINT --------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint (API + Worker)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run Python lint
        run: |
          flake8 api
          flake8 worker

      # Node lint (frontend)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        run: |
          cd frontend
          npm install
          npx eslint .

# -------------------- TEST --------------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies + tests
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run API unit tests (Redis mocked)
        run: |
          cd api
          pytest --cov=. --cov-report=term

# -------------------- BUILD --------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t api:${{ github.sha }} -f docker/Dockerfile.api api
          docker build -t worker:${{ github.sha }} -f docker/Dockerfile.worker worker
          docker build -t frontend:${{ github.sha }} -f docker/Dockerfile.frontend frontend

# -------------------- SECURITY SCAN --------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

# -------------------- INTEGRATION TEST --------------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker-compose up -d --build

      - name: Wait for services
        run: sleep 15

      - name: Test job flow
        run: |
          curl -X POST http://localhost:8000/submit
          sleep 5
          curl http://localhost:3000/status/1

      - name: Shutdown stack
        run: docker-compose down

# -------------------- DEPLOY --------------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deployment
        run: |
          docker-compose up -d --build --no-deps api
