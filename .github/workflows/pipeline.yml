name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5000

jobs:

# -------------------- LINT --------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python lint
        run: |
          pip install flake8
          flake8 api worker

      - name: Node lint
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Docker lint (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true

# -------------------- TEST --------------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install API deps
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml

# -------------------- BUILD --------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Enable BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build images (SHA + latest)
        run: |
          docker build -t api:${{ github.sha }} -t api:latest api
          docker build -t worker:${{ github.sha }} -t worker:latest worker
          docker build -t frontend:${{ github.sha }} -t frontend:latest frontend

# -------------------- SECURITY --------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

# -------------------- INTEGRATION --------------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker-compose up -d --build

      - name: Wait for API
        run: sleep 20

      - name: Run integration test
        run: |
          JOB=$(curl -s -X POST http://localhost:8000/submit | jq -r .job_id)
          sleep 5
          STATUS=$(curl -s http://localhost:8000/status/$JOB | jq -r .status)
          test "$STATUS" = "queued" || exit 1

      - name: Cleanup always
        if: always()
        run: docker-compose down -v

# -------------------- DEPLOY --------------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy
        run: |
          docker-compose up -d --build --no-deps api
